name: Deploy app

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "Build ID to redeploy (leave empty to build fresh)"
        required: false
        type: string

env:
  BUILD_ID: ""
  PM2_APP_NAME: "aprilon-next"

jobs:
  deploy:
    name: "Deploy app"
    runs-on: ubuntu-latest
    environment: Public

    steps:
      - name: Checkout code
        if: inputs.build_id == ''
        uses: actions/checkout@v4

      - name: Set pre-build environment variables
        run: |
          if [ -n "${{ inputs.build_id }}" ]; then
            echo "BUILD_ID=${{ inputs.build_id }}" >> $GITHUB_ENV
          else
            echo "BUILD_ID=aprilon-$(git rev-parse --short HEAD)-$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_ENV
          fi

      - name: Log build ID
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -n "${{ inputs.build_id }}" ]; then
            echo "♻️  REDEPLOYMENT"
          else
            echo "🏗️  FRESH BUILD"
          fi
          echo "🔖 Build ID:   ${{ env.BUILD_ID }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies & build
        if: inputs.build_id == ''
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package build artifacts
        if: inputs.build_id == ''
        run: |
          zip -r build.zip .next/standalone .next/static public

      - name: Get GitHub Actions agent IP
        id: get_ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Whitelist GitHub Action IP in firewall
        uses: adnanjaw/ip-whitelist-on-hetznerfw@v2.2
        with:
          hetzner_api_key: ${{ secrets.HETZNER_API_TOKEN }}
          firewall_name: ${{ secrets.HETZNER_FIREWALL_NAME }}
          ip_address: ${{ steps.get_ip.outputs.ip }}
          description: "github-actions-rule-${{ github.run_id }}"
          port: ${{ secrets.REMOTE_HOST_PORT }}
          protocol: "tcp"
          direction: "in"
          cleanup: true

      - name: Copy files to server
        if: inputs.build_id == ''
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST_IP }}
          username: ${{ secrets.REMOTE_HOST_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_HOST_PORT }}
          source: "build.zip"
          target: "${{ vars.REMOTE_BASE }}/${{ env.BUILD_ID }}"

      - name: Ensure remote directories exist
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST_IP }}
          username: ${{ secrets.REMOTE_HOST_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_HOST_PORT }}
          script: |
            mkdir -p "${{ vars.REMOTE_BASE }}"
            mkdir -p "$(dirname "${{ vars.REMOTE_CURRENT }}")"

      - name: Unpack & deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST_IP }}
          username: ${{ secrets.REMOTE_HOST_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_HOST_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            set -e
            BUILD_DIR="${{ vars.REMOTE_BASE }}/${{ env.BUILD_ID }}"

            if [ ! -d "$BUILD_DIR" ]; then
              echo "❌ Build directory not found: $BUILD_DIR"
              echo "   Available builds:"
              ls "${{ vars.REMOTE_BASE }}" | grep aprilon- | sed 's/^/   - /'
              exit 1
            fi

            if [ "${{ inputs.build_id }}" = "" ]; then
              echo "📦 Unpacking build ${{ env.BUILD_ID }}..."
              cd "$BUILD_DIR"
              unzip -o build.zip
              #rm build.zip

              cp -r .next/static .next/standalone/.next/static
              cp -r public .next/standalone/public
            else
              echo "♻️  Reusing existing build ${{ env.BUILD_ID }}, skipping unpack..."
            fi

            # Always re-write ecosystem config (env may have changed between deployments)
            cat > "$BUILD_DIR/.next/standalone/ecosystem.config.js" <<EOF
            module.exports = {
              apps: [{
                name: "${{ env.PM2_APP_NAME }}",
                script: "./server.js",
                cwd: "${{ vars.REMOTE_CURRENT }}",
                env: {
                  PORT: "${{ vars.APP_PORT }}",
                  STEAM_API_KEY: "${{ secrets.STEAM_API_KEY }}",
                  NEXT_PUBLIC_APP_URL: "${{ vars.NEXT_PUBLIC_APP_URL }}"
                }
              }]
            }
            EOF

            # Record previous symlink for rollback
            if [ -L "${{ vars.REMOTE_CURRENT }}" ]; then
              readlink "${{ vars.REMOTE_CURRENT }}" > "${{ vars.REMOTE_BASE }}/previous_build"
              echo "📌 Previous build: $(cat ${{ vars.REMOTE_BASE }}/previous_build)"
            else
              echo "" > "${{ vars.REMOTE_BASE }}/previous_build"
              echo "ℹ️  No previous build found"
            fi

            ln -sfn "$BUILD_DIR/.next/standalone" "${{ vars.REMOTE_CURRENT }}"
            echo "🔗 Symlink updated to $BUILD_DIR"

            pm2 delete ${{ env.PM2_APP_NAME }} || true
            pm2 start "${{ vars.REMOTE_CURRENT }}/ecosystem.config.js"
            pm2 save

      - name: Verify PM2 status
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST_IP }}
          username: ${{ secrets.REMOTE_HOST_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_HOST_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            sleep 5

            if pm2 describe ${{ env.PM2_APP_NAME }} > /dev/null 2>&1; then
                STATUS=$(pm2 jlist | python3 -c "import sys,json; procs=json.load(sys.stdin); app=[p for p in procs if p['name']=='${{ env.PM2_APP_NAME }}']; print(app[0]['pm2_env']['status'] if app else 'not_found')")
                if [ "$STATUS" != "online" ]; then
                    echo "❌ PM2 process is not online (status: $STATUS) — initiating rollback..."

                    PREVIOUS=$(cat ${{ vars.REMOTE_BASE }}/previous_build)
                    if [ -n "$PREVIOUS" ] && [ -d "$PREVIOUS" ]; then
                        echo "⏪ Rolling back to $PREVIOUS..."
                        ln -sfn "$PREVIOUS" "${{ vars.REMOTE_CURRENT }}"
                        pm2 delete ${{ env.PM2_APP_NAME }} || true
                        pm2 start "${{ vars.REMOTE_CURRENT }}/ecosystem.config.js"
                        sleep 5

                        ROLLBACK_STATUS=$(pm2 jlist | python3 -c "import sys,json; procs=json.load(sys.stdin); app=[p for p in procs if p['name']=='${{ env.PM2_APP_NAME }}']; print(app[0]['pm2_env']['status'] if app else 'not_found')")
                        if [ "$ROLLBACK_STATUS" = "online" ]; then
                            echo "✅ Rollback successful — previous build is running"
                        else
                            echo "❌ Rollback also failed (status: $ROLLBACK_STATUS)"
                            pm2 logs ${{ env.PM2_APP_NAME }} --lines 30 --nostream
                        fi
                    else
                        echo "⚠️  No previous build to roll back to"
                        pm2 logs ${{ env.PM2_APP_NAME }} --lines 30 --nostream
                    fi

                    exit 1
                else
                    echo "✅ PM2 process is online"
                    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                    echo "🟢 Deployed build ID: ${{ env.BUILD_ID }}"
                    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                fi
            else
                echo "❌ PM2 process '${{ env.PM2_APP_NAME }}' not found"
                exit 1
            fi

      - name: Clean up old builds
        if: success() && inputs.build_id == ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST_IP }}
          username: ${{ secrets.REMOTE_HOST_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_HOST_PORT }}
          script: |
            CURRENT=$(readlink "${{ vars.REMOTE_CURRENT }}" | xargs dirname | xargs dirname)
            PREVIOUS=$(cat ${{ vars.REMOTE_BASE }}/previous_build | xargs dirname 2>/dev/null || echo "")

            ls -dt "${{ vars.REMOTE_BASE }}"/aprilon-* 2>/dev/null \
              | tail -n +4 \
              | while read dir; do
                  if [ "$dir" != "$CURRENT" ] && [ "$dir" != "$PREVIOUS" ]; then
                    echo "🗑️  Removing old build: $dir"
                    rm -rf "$dir"
                  fi
                done
